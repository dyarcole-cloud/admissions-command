<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <radialGradient id="core" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="35%" stop-color="#a78bfa"/>
      <stop offset="75%" stop-color="#5b3aa1"/>
      <stop offset="100%" stop-color="#0a0e1a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="hairline" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="softglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
  </defs>

  <!-- Rounded-square chassis -->
  <rect x="0" y="0" width="64" height="64" rx="14" fill="#0a0e1a"/>
  <rect x="0.5" y="0.5" width="63" height="63" rx="13.5" fill="none" stroke="url(#hairline)" stroke-width="0.75"/>

  <!-- Radial-violet core -->
  <circle cx="32" cy="28" r="22" fill="url(#core)" opacity="0.95"/>

  <!-- Accent line (violet → copper) sliced through -->
  <rect x="14" y="38.5" width="36" height="2.5" rx="1.25" fill="url(#accent)" filter="url(#softglow)"/>
  <rect x="14" y="38.5" width="36" height="2.5" rx="1.25" fill="url(#accent)"/>

  <!-- Subtle inner highlight (lightning quality) -->
  <ellipse cx="28" cy="22" rx="9" ry="3.5" fill="#ffffff" opacity="0.18"/>
</svg>
